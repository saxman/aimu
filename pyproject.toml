[project]
name = "aimu"
version = "0.2.0"
description = "A Python package containing tools for working with various language models and AI services."
readme = "README.md"
requires-python = ">=3.10"
license = {file = "LICENSE"}

dependencies = [
    "sqlalchemy",
    "chromadb",
    "fastmcp",
    "nest_asyncio",
    "streamlit",
    "gradio",
    "watchdog",
    "tinydb",
    "requests"
]

[project.optional-dependencies]
dev = [
    "ruff",
    "pytest",
]
notebooks = [
    "ipykernel",
    "ipywidgets",
]
hf = [
    "torch",
    "transformers",
    "accelerate",
    "sentencepiece",
    "mistral-common", # required for Mistral-Small-3.2 model
    "kernels", # required for GPT-OSS
]
ollama = [
    "ollama",
]
aisuite = [
    "aisuite[openai]>=0.1.14",
    "anthropic>=0.50.0",
    "docstring-parser>=0.15.0",
    "python-dotenv"
]
openai_compat = [
    "openai>=1.0.0",
]
llamacpp = [
    "llama-cpp-python",
]
all = ["aimu[hf,ollama,aisuite,openai_compat,llamacpp]"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aimu*"]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.pytest.ini_options]
pythonpath = [
  "."
]

